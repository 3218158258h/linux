# Gateway Configuration File
# Generated by ConfigManager
# 请先修改app_router.c中的配置文件路径
# ========== 传输层配置 ==========
[transport]
# 传输类型: mqtt, dds, auto
type = dds

# 默认QoS级别
default_qos = 1

# ========== MQTT配置 ==========
[mqtt]
# MQTT Broker地址
server = tcp://10.60.77.221:1883

# 客户端ID (唯一标识)
client_id = gateway-imx6ull

# 用户名和密码 (如果Broker需要认证)
username = 
password = 

# 心跳间隔 (秒)
keepalive = 60

# 发布话题 (设备上报数据到云端)
publish_topic = gateway/data

# 订阅话题 (接收云端下发的指令)
subscribe_topic = gateway/command

# ========== DDS配置 ==========
[dds]
# DDS域ID (同一域内的节点可以通信)
domain_id = 0

# 参与者名称
participant_name = gateway-imx6ull

# 是否自动发现节点
auto_discovery = true

# 发布话题 (设备上报数据)
publish_topic = GatewayData
publish_type = GatewayDataType

# 订阅话题 (接收云端指令)
subscribe_topic = GatewayCommand
subscribe_type = GatewayCommandType

# ========== 其他配置保持不变 ==========
[bluetooth]
device = /dev/ttyUSB0
baud_rate = 115200

[log]
file_path = /var/log/gateway.log
level = INFO
max_size = 10485760
max_count = 5
show_file_line = false
show_thread_id = false

[persistence]
db_path = /home/nvidia/gateway/messages.db
max_retry = 3
expire_hours = 24

[device]
max_devices = 32
heartbeat_timeout = 30