# 网关总配置清单
# 这里只保留全局入口、少量运行时参数和三类分层配置文件路径。

[config_files]
# 网络协议层配置文件，负责 MQTT/DDS 连接与主题。
transport = config/transport.ini
# 物理传输层配置文件，负责 UART/CAN/SPI/I2C 参数。
physical_transport = config/transport_physical.ini
# 私有协议定义文件，负责帧格式、ACK/NACK 和初始化命令模板。
protocols = config/protocols.ini

[runtime]
# 线程池执行器数量，控制后台任务并发度。
thread_pool_executors = 4

[router]
# 路由缓冲区上限，决定单条消息的最大承载能力。
max_message_size = 4096

[persistence]
# SQLite 消息数据库路径。
db_path = /home/nvidia/gateway/messages.db
# 失败后最多重试次数。
max_retry = 3
# 消息过期时间（小时）。
expire_hours = 24
# 本地待发送消息队列上限。
max_queue_size = 20000

[device]
# 设备总数上限，超过后忽略多余条目。
max_devices = 32
# 设备心跳超时（秒）。
heartbeat_timeout = 30
# 设备读写缓冲区大小（字节）。
buffer_size = 16384
# 设备实例对应的物理节点路径，按顺序与 interface/protocol 对齐。
serial_devices = /tmp/gateway-vdev/gw0,/tmp/gateway-vdev/gw1,/tmp/gateway-vdev/gw2,/tmp/gateway-vdev/gw3,/tmp/gateway-vdev/gw4,/tmp/gateway-vdev/gw5
# 每个设备实例使用的物理接口类型；必须与 serial_devices 顺序一致。
serial_interfaces = serial,serial,serial,serial,serial,serial
# 每个设备实例使用的协议名称；用于从 protocols.ini 取对应协议节。
serial_protocols = ble_mesh_default,ble_mesh_default,ble_mesh_default,ble_mesh_default,ble_mesh_default,ble_mesh_default

[bluetooth]
# 蓝牙模块主地址，用于 init_cmds 模板中的 {m_addr}。
m_addr = 0001
# 蓝牙网络 ID，用于 init_cmds 模板中的 {net_id}。
net_id = 1111
# 工作波特率，对应协议模板中的 {baud_code}。
baud_rate = 115200
