# 网络协议层配置
# 这里只配置 MQTT/DDS 的连接参数、话题和默认行为。

[transport]
# 当前云侧协议类型：mqtt / dds / auto。
type = dds
# 传输默认 QoS，仅对支持 QoS 的协议生效。
default_qos = 0

[mqtt]
# MQTT Broker 地址。
server = tcp://10.60.77.221:1883
# MQTT 客户端 ID。
client_id = gateway-imx6ull
# 认证用户名，可留空。
username = 
# 认证密码，可留空。
password = 
# MQTT 心跳间隔（秒）。
keepalive = 60
# 设备上报主题。
publish_topic = gateway/data
# 云端下发主题。
subscribe_topic = gateway/command

[dds]
# DDS 域 ID。
domain_id = 0
# DDS 参与者名称。
participant_name = gateway-imx6ull
# 是否开启自动发现。
auto_discovery = true
# DDS 上报话题名。
publish_topic = GatewayData
# DDS 上报类型名。
publish_type = GatewayDataType
# DDS 下发话题名。
subscribe_topic = GatewayCommand
# DDS 下发类型名。
subscribe_type = GatewayCommandType
