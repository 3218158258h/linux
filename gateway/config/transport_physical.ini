# 物理传输层配置
# 这里只描述 UART/CAN/SPI/I2C 这些字节流接口自身的参数。

[transport.serial_default]
# 串口默认配置：用于大多数串口设备的基础参数。
# 接口类型，串口设备通常填 serial 或 uart。
interface = serial
# 设备节点路径，例如 /dev/ttyUSB0。
device_path = /dev/ttyUSB0
# 波特率编码，对应串口驱动和设备协议要求。
baud_rate = 115200
# 停止位设置，0 表示 1 位。
stop_bits = 0
# 校验位设置，0 表示无校验。
parity = 0
# 阻塞模式，0 表示非阻塞。
block_mode = 0

[transport.can0]
# CAN 接口配置：比特率、回环、只监听等参数都在这一层定义。
# 接口类型，CAN 设备固定填 can。
interface = can
# CAN 设备节点或接口名。
device_path = can0
# CAN 总线比特率。
bitrate = 500000
# 是否开启回环。
loopback = 0
# 是否只监听不发送。
listen_only = 0
# 是否启用 CAN FD。
fd_mode = 0

[transport.spi0]
# SPI 接口配置：时钟、模式、字长和片选参数。
# 接口类型，SPI 设备固定填 spi。
interface = spi
# SPI 设备节点。
device_path = /dev/spidev0.0
# SPI 时钟频率（Hz）。
clock_hz = 1000000
# SPI 模式（0-3）。
mode = 0
# 每字位数。
bits_per_word = 8
# 是否低位优先。
lsb_first = 0
# 片选号。
chip_select = 0

[transport.i2c0]
# I2C 接口配置：速率、地址、10 位地址和时钟拉伸控制。
# 接口类型，I2C 设备固定填 i2c。
interface = i2c
# I2C 设备节点。
device_path = /dev/i2c-1
# I2C 总线速率（Hz）。
bus_speed_hz = 100000
# 7 位或 10 位从机地址。
address = 80
# 是否使用 10 位地址模式。
ten_bit_address = 0
# 是否允许时钟拉伸。
clock_stretching = 1
